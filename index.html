<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Aukit Tantisuparak</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffffff' stroke='%23e2e8f0' stroke-width='4'/><text x='50' y='72' font-family='sans-serif' font-size='65' font-weight='bold' fill='%23111827' text-anchor='middle'>A</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --white: #ffffff;
            --off-white: #f8fafc;
            --gray-50: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-600: #475569;
            --gray-900: #0f172a;
            --accent: #6366f1;
            --accent-light: #818cf8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Sarabun', sans-serif;
            background: var(--off-white);
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
        }

        .welcome-page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background layers */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(148, 163, 184, 0.08) 0%, transparent 55%),
                linear-gradient(180deg, #ffffff 0%, #f8fafc 50%, #f1f5f9 100%);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(226, 232, 240, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 232, 240, 0.5) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 75%);
        }

        #particle-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 3D Scene */
        #scene-3d {
            position: absolute;
            inset: 0;
            perspective: 1200px;
            pointer-events: none;
            overflow: hidden;
        }

        .shape-3d {
            position: absolute;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .cube {
            width: 56px;
            height: 56px;
            top: 18%;
            left: 12%;
            animation: spin-cube 18s linear infinite;
        }

        .cube-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .cube-face {
            position: absolute;
            width: 56px;
            height: 56px;
            border: 1.5px solid rgba(226, 232, 240, 0.9);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.8), 0 8px 32px rgba(15, 23, 42, 0.06);
        }

        .cube-face:nth-child(1) { transform: rotateY(0deg) translateZ(28px); }
        .cube-face:nth-child(2) { transform: rotateY(180deg) translateZ(28px); }
        .cube-face:nth-child(3) { transform: rotateY(90deg) translateZ(28px); }
        .cube-face:nth-child(4) { transform: rotateY(-90deg) translateZ(28px); }
        .cube-face:nth-child(5) { transform: rotateX(90deg) translateZ(28px); }
        .cube-face:nth-child(6) { transform: rotateX(-90deg) translateZ(28px); }

        @keyframes spin-cube {
            from { transform: rotateX(-20deg) rotateY(0deg); }
            to { transform: rotateX(-20deg) rotateY(360deg); }
        }

        .ring {
            width: 100px;
            height: 100px;
            top: 22%;
            right: 14%;
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 50%;
            background: transparent;
            box-shadow:
                0 0 0 8px rgba(255,255,255,0.5),
                0 20px 60px rgba(15, 23, 42, 0.05),
                inset 0 0 30px rgba(255,255,255,0.9);
            animation: spin-ring 12s linear infinite;
        }

        @keyframes spin-ring {
            from { transform: rotateX(70deg) rotateZ(0deg); }
            to { transform: rotateX(70deg) rotateZ(360deg); }
        }

        .sphere {
            width: 44px;
            height: 44px;
            bottom: 28%;
            left: 18%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffffff, #e2e8f0);
            box-shadow:
                0 16px 40px rgba(15, 23, 42, 0.08),
                inset -4px -4px 12px rgba(148, 163, 184, 0.2),
                inset 4px 4px 12px rgba(255, 255, 255, 0.9);
        }

        .prism {
            width: 0;
            height: 0;
            bottom: 32%;
            right: 16%;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 52px solid rgba(255, 255, 255, 0.85);
            filter: drop-shadow(0 16px 32px rgba(15, 23, 42, 0.07));
            animation: spin-prism 14s ease-in-out infinite alternate;
        }

        @keyframes spin-prism {
            from { transform: rotateY(-30deg) rotateX(10deg); }
            to { transform: rotateY(30deg) rotateX(-10deg); }
        }

        .dot-cluster {
            top: 55%;
            right: 22%;
            display: flex;
            gap: 10px;
        }

        .dot-cluster span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            border: 1px solid var(--gray-200);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
        }

        .dot-cluster span:nth-child(2) { transform: translateY(-14px); }
        .dot-cluster span:nth-child(3) { transform: translateY(8px); }

        /* Hero card */
        .hero-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1000px;
            padding: 1.5rem;
        }

        #hero-card {
            position: relative;
            width: min(420px, 92vw);
            padding: 2.5rem 2rem 2rem;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            box-shadow:
                0 0 0 1px rgba(226, 232, 240, 0.5),
                0 4px 6px rgba(15, 23, 42, 0.02),
                0 24px 80px rgba(15, 23, 42, 0.08),
                0 48px 120px rgba(99, 102, 241, 0.06);
            transform-style: preserve-3d;
            transition: box-shadow 0.4s ease;
            text-align: center;
        }

        #hero-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(226,232,240,0.4), rgba(99,102,241,0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .avatar-frame {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 1.5rem;
            transform: translateZ(40px);
        }

        .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, var(--gray-200), var(--white), var(--accent-light), var(--gray-200));
            animation: rotate-ring 6s linear infinite;
        }

        @keyframes rotate-ring {
            to { transform: rotate(360deg); }
        }

        .avatar-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--white);
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.1);
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.35rem 0.85rem;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .welcome-badge .pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .hero-title {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            color: var(--gray-900);
            margin-bottom: 0.35rem;
            transform: translateZ(30px);
        }

        .hero-subtitle {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 0.75rem;
            transform: translateZ(25px);
        }

        .hero-desc {
            font-size: 0.875rem;
            line-height: 1.65;
            color: var(--gray-600);
            max-width: 320px;
            margin: 0 auto 1.5rem;
            transform: translateZ(20px);
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
            transform: translateZ(15px);
        }

        .tag {
            padding: 0.3rem 0.75rem;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--gray-600);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.03);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--white);
            background: var(--gray-900);
            border: none;
            border-radius: 14px;
            text-decoration: none;
            cursor: pointer;
            transform: translateZ(35px);
            box-shadow:
                0 4px 14px rgba(15, 23, 42, 0.2),
                0 0 0 1px rgba(15, 23, 42, 0.05);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .cta-btn:hover {
            background: #1e293b;
            transform: translateZ(35px) translateY(-2px);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.25);
        }

        .cta-btn svg {
            transition: transform 0.25s ease;
        }

        .cta-btn:hover svg {
            transform: translateX(4px);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
            transform: translateZ(10px);
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
        }

        .social-links a:hover {
            color: var(--gray-900);
            border-color: var(--gray-400);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-400);
            z-index: 5;
            animation: fade-bounce 2.5s ease infinite;
        }

        @keyframes fade-bounce {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(6px); }
        }

        .reveal {
            opacity: 0;
            animation: reveal-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes reveal-up {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .cube, .ring, .prism { opacity: 0.5; transform: scale(0.75); }
            .sphere { opacity: 0.6; }
            #hero-card { padding: 2rem 1.5rem 1.75rem; border-radius: 22px; }
            .scroll-hint { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="welcome-page">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <canvas id="particle-canvas" aria-hidden="true"></canvas>

        <!-- 3D floating shapes -->
        <div id="scene-3d" aria-hidden="true">
            <div class="shape-3d cube" data-float data-base-transform="">
                <div class="cube-inner">
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                </div>
            </div>
            <div class="shape-3d ring" data-float data-base-transform=""></div>
            <div class="shape-3d sphere" data-float data-base-transform=""></div>
            <div class="shape-3d prism" data-float data-base-transform=""></div>
            <div class="shape-3d dot-cluster" data-float data-base-transform="">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Hero -->
        <div class="hero-wrapper">
            <div id="hero-card">
                <div class="avatar-frame reveal">
                    <div class="avatar-ring"></div>
                    <div class="avatar-inner">
                        <img src="https://avatars.githubusercontent.com/u/218899455?v=4" alt="Aukit Tantisuparak">
                    </div>
                </div>

                <div class="welcome-badge reveal">
                    <span class="pulse"></span>
                    Welcome
                </div>

                <h1 class="hero-title reveal">Aukit Tantisuparak</h1>
                <p class="hero-subtitle reveal">Frontend Developer & UX/UI Designer</p>
                <p class="hero-desc reveal">
                    ยินดีต้อนรับสู่ E-Portfolio ของผม — พื้นที่แสดงผลงาน ทักษะ และการเติบโตในสายงาน Digital Industry
                </p>

                <div class="tags reveal">
                    <span class="tag">CAMT · DII</span>
                    <span class="tag">Chiang Mai University</span>
                    <span class="tag">GPAX 3.60</span>
                </div>

                <a href="portfolio.html" class="cta-btn reveal">
                    เข้าชม Portfolio
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </a>

                <div class="social-links reveal">
                    <a href="https://github.com/aukit-study" target="_blank" rel="noopener" title="GitHub">GH</a>
                    <a href="mailto:aukit.tanti@gmail.com" title="Email">@</a>
                    <a href="https://medium.com/@aukit.tanti" target="_blank" rel="noopener" title="Medium">M</a>
                </div>
            </div>
        </div>

        <div class="scroll-hint" aria-hidden="true">
            <span>Enter</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        </div>
    </div>

    <script src="js/welcome.js"></script>
</body>

</html>
