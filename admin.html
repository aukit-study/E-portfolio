<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sarabun:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 p-6">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-semibold text-gray-900">➕ เพิ่มผลงานใหม่ (Admin)</h1>
            <a href="index.html" class="text-xs text-gray-500 hover:underline">← กลับหน้าหลัก</a>
        </div>

        <form id="project-form" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase mb-1">ชื่อโปรเจกต์</label>
                <input type="text" id="title" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase mb-1">บทบาทของคุณ</label>
                    <input type="text" id="role" required
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase mb-1">ประเภทโปรเจกต์</label>
                    <select id="type"
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white focus:outline-black">
                        <option>Production Project</option>
                        <option>Competition Project</option>
                        <option>Academic Project</option>
                        <option>Personal Project</option>
                        <option>Open Source / Contributions</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase mb-1">คำอธิบายสั้นๆ</label>
                <textarea id="description" required rows="2"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase mb-1">กลุ่มเป้าหมาย</label>
                    <input type="text" id="target_audience" required
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase mb-1">ปัญหาที่แก้ไข</label>
                    <input type="text" id="problem_solved" required
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase mb-1">สิ่งที่ได้เรียนรู้</label>
                <textarea id="what_i_learned" required rows="2"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black"></textarea>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase mb-1">Tech Stack (ใช้จุลภาคคั่น เช่น
                    React, Tailwind)</label>
                <input type="text" id="tech_stack"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase mb-1">GitHub URL</label>
                <input type="url" id="github_url"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-black">
            </div>

            <div class="flex gap-6 py-2">
                <label class="flex items-center gap-2 text-sm text-gray-600">
                    <input type="checkbox" id="is_visible" checked class="rounded border-gray-300"> เปิดแสดงผลหน้าบ้าน
                    (Show)
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-600">
                    <input type="checkbox" id="is_favorite" class="rounded border-gray-300"> ตั้งเป็นชิ้นโปรด (Favorite)
                </label>
            </div>

            <button type="submit"
                class="w-full bg-black text-white text-sm font-medium py-2.5 rounded hover:bg-gray-800 transition-colors">
                💾 บันทึกข้อมูลลงฐานข้อมูล
            </button>
        </form>
    </div>

    <!-- Configuration and Logic -->
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
